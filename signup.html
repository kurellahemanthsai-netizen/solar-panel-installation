<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>SolarTech</title>

  <link rel="shortcut icon" href="images/logo.png" type="image/x-icon">

  <!-- GOOGLE FONT -->

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- FONT AWESOME -->

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- CSS -->

  <link rel="stylesheet" href="signup.css">

</head>

<body>

<!-- ================= SIGNUP SECTION ================= -->

<section class="signup-section">

  <div class="signup-box">

    <!-- THEME + RTL BUTTONS -->

    <div class="theme-wrapper">

      <button class="theme-toggle" id="themeToggle">

        <i class="fa-solid fa-moon"></i>

        <span></span>

      </button>

      <button class="rtl-toggle" id="rtlToggle">

        RTL

      </button>

    </div>

    <!-- LOGO -->

    <div class="logo" onclick="document.location='index.html'">

      <span class="bl">Solar</span>
      <span class="yl">Tech</span>

    </div>

    <!-- TITLE -->

    <h1>Create Account</h1>

    <p class="subtitle">
      Join SolarTech and start your renewable energy journey.
    </p>

    <!-- FORM -->

    <form>

      <!-- NAME -->

      <div class="double-input">

        <div class="input-group">

          <label>First Name</label>

          <input type="text" placeholder="First name">

        </div>

        <div class="input-group">

          <label>Last Name</label>

          <input type="text" placeholder="Last name">

        </div>

      </div>

      <!-- EMAIL -->

      <div class="input-group">

        <label>Email Address</label>

        <input type="email" placeholder="Enter email">

      </div>

      <!-- PHONE -->

      <div class="input-group">

        <label>Phone Number</label>

        <input type="tel" placeholder="Phone number">

      </div>

      <!-- PASSWORD -->

      <div class="double-input">

        <div class="input-group">

          <label>Password</label>

          <input type="password" placeholder="Password">

        </div>

        <div class="input-group">

          <label>Confirm Password</label>

          <input type="password" placeholder="Confirm">

        </div>

      </div>

      <!-- TERMS -->

      <div class="terms">

        <input type="checkbox">

        <p>

          I agree to the

          <a href="#">Terms</a>

          &

          <a href="#">Privacy Policy</a>

        </p>

      </div>

      <!-- BUTTON -->

      <button class="signup-btn">

        Create Account

      </button>

    </form>

    <!-- DIVIDER -->

    <div class="divider">

      <span>OR SIGN UP WITH</span>

    </div>

    <!-- SOCIAL BUTTONS -->

    <div class="social-buttons">

      <button class="social-btn">

        Google

      </button>

      <button class="social-btn">

        Apple

      </button>

    </div>

    <!-- LOGIN -->

    <p class="login-text">

      Already have an account?

      <a href="login.html">Login</a>

    </p>

  </div>

</section>

<!-- ================= SCRIPT ================= -->

<script src="signup.js"></script>

</body>

</html>
