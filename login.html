<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>SolarTech</title>
  <link rel="shortcut icon" href="images/logo.png" type="image/x-icon">

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="login.css">

</head>

<body>

<!-- ================= LOGIN SECTION ================= -->

<section class="login-section">

  <div class="login-box">

    <!-- LOGO -->

    <div class="logo" onclick="document.location='index.html'">

      <span class="bl">Solar</span>
      <span class="yl">Tech</span>

    </div>

    <!-- TITLE -->

    <h1>Welcome Back</h1>

    <p class="subtitle">
      Login to continue your renewable energy journey with SolarTech.
    </p>

    <!-- FORM -->

    <form>

      <!-- EMAIL -->

      <div class="input-group">

        <label>Email Address</label>

        <div class="input-box">

          <input type="email" placeholder="Enter your email">

        </div>

      </div>

      <!-- PASSWORD -->

      <div class="input-group">

        <label>Password</label>

        <div class="input-box">

          <input type="password" placeholder="Enter your password">

        </div>

      </div>

      <!-- OPTIONS -->

      <div class="options">

        <div class="remember">

          <input type="checkbox">

          <span>Remember Me</span>

        </div>

        <a href="#">Forgot Password?</a>

      </div>

      <!-- LOGIN BUTTON -->

      <button class="login-btn">

        Login Account

      </button>

    </form>

    <!-- DIVIDER -->

    <div class="divider">

      <span>OR CONTINUE WITH</span>

    </div>

    <!-- SOCIAL BUTTONS -->

    <div class="social-buttons">

      <button class="social-btn">
        Google
      </button>

      <button class="social-btn">
        Facebook
      </button>

    </div>

    <!-- SIGNUP -->

    <p class="signup-text">

      Don't have an account?

      <a href="#" onclick="document.location='signup.html'">Create Account</a>

    </p>

  </div>

</section>

</body>

</html>
